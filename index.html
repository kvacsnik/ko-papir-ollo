<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Micimackó Kő Papír Olló</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍯 Micimackó Kő-Papír-Olló 🍯</h1>

<!-- KARAKTER VÁLASZTÁS -->
<div id="characterSelect">

<h2>Válassz karaktert!</h2>

<div class="charButtons">

<button onclick="chooseCharacter('winnie')">
<img src="images/micimacko.jpg" alt="Micimackó">
<p>Micimackó</p>
</button>

<button onclick="chooseCharacter('piglet')">
<img src="images/malacka.jpg" alt="Malacka">
<p>Malacka</p>
</button>

</div>

</div>

<!-- JÁTÉK -->
<div id="game" style="display:none">

<div class="players">

<div class="player">
<img id="playerImg">
<p>Te</p>
<p>Nyert körök: <span id="playerScore">0</span></p>
</div>

<div class="player">
<img id="computerImg">
<p>Gép</p>
<p>Nyert körök: <span id="computerScore">0</span></p>
</div>

</div>

<h2 id="round">Kör: 1 / 3</h2>

<div class="buttons">

<button onclick="play('ko')">🪨 Kő</button>
<button onclick="play('papir')">📄 Papír</button>
<button onclick="play('ollo')">✂️ Olló</button>

</div>

<p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
